<template>
    <lightning-card title="Opportunities" icon-name="standard:opportunity">
        <template lwc:if={hasOpportunities}>
            <lightning-datatable
                key-field="Id"
                data={opportunities}
                columns={columns}
                draft-values={draftValues}
                onsave={handleSave}
                hide-checkbox-column
            ></lightning-datatable>
        </template>
        <template lwc:elseif={error}>
            <div class="slds-p-around_medium slds-text-color_error" data-id="error">
                {errorMessage}
            </div>
        </template>
        <template lwc:elseif={isEmpty}>
            <div class="slds-p-around_medium" data-id="empty">
                No opportunities to display.
            </div>
        </template>
    </lightning-card>
</template>
